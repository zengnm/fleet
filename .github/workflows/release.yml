name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CGO_ENABLED: "0"
  GOPROXY: https://proxy.golang.org,direct

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: windows
            goarch: amd64
            archive_ext: zip
            binary_ext: .exe
          - goos: windows
            goarch: arm64
            archive_ext: zip
            binary_ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build package
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BINARY_EXT: ${{ matrix.binary_ext }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          target="${GOOS}-${GOARCH}"
          outdir="dist/${target}"
          packagedir="dist/packages"
          binaries=(fleetd fleet fleetn)
          build_flags=(-trimpath -buildvcs=false -gcflags=all=-l -ldflags="-s -w -buildid=")

          mkdir -p "${outdir}" "${packagedir}"

          for binary in "${binaries[@]}"; do
            go build "${build_flags[@]}" -o "${outdir}/${binary}${BINARY_EXT}" "./cmd/${binary}"
            archive_base="${binary}_${version}_${GOOS}_${GOARCH}"

            if [ "${ARCHIVE_EXT}" = "zip" ]; then
              (
                cd "${outdir}"
                zip -9 -q "../../${packagedir}/${archive_base}.zip" "${binary}${BINARY_EXT}"
              )
            else
              tar -C "${outdir}" -cf - "${binary}${BINARY_EXT}" | gzip -9 > "${packagedir}/${archive_base}.tar.gz"
            fi
          done

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/packages/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: package-*
          path: dist/packages
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist/packages
          sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/packages/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
